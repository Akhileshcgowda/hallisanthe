<body class="bg-background text-on-background font-body-md text-body-md min-h-screen flex items-center justify-center relative overflow-x-hidden p-container-margin">
<!-- Decorative Background Orbs (Tactile Modernism Ambient Base) -->
<div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-primary-fixed/30 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-secondary-fixed/30 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Main Registration Card -->
<div class="w-full max-w-md bg-surface-container-lowest p-lg rounded-[24px] shadow-[0px_8px_32px_rgba(230,92,0,0.08)] relative z-10 border border-surface-container-low">
<!-- Header -->
<div class="text-center mb-lg">
<img alt="Halli-Santhe Brand Logo" class="w-auto mx-auto mb-md h-[56px]" data-alt="The official logo of Halli-Santhe, a vibrant marketplace brand. The logo is displayed clearly against a clean, light mode background. The lighting is soft and even, highlighting the brand's earthy and welcoming aesthetic with a focus on deep saffron and warm tones. The overall mood is professional yet deeply rooted in cultural heritage." src="https://lh3.googleusercontent.com/aida/ADBb0uj2tApFsGwmoD2la--e_6330RszmD_tUE1ECd6_Sy1EzcjX3MImZbpbSDXZpIBNdLpFukX5hVck0mIKeuVmJSGRZ-93Wbdq9QughKDhZC4fTkz9I1qQ8ojhnbEGWskwVSFFG8fHjP_70ClNz776y6VKggRPFm5cqlVwYPwIq9QttKkHoCtQ4aIHhBkxBeCP1rm_IZC3O-AbwpJRp7vkylqTMdnHoU7fnzoBdNR1zRYZZ5TX9yodGW8M34C87foWnTJZOZkeL6Z5Cg"/>
<h1 class="font-headline-md text-headline-md text-on-surface">Join the Santhe</h1>
</div>
<!-- Tabs -->
<div class="flex bg-surface-variant p-xs rounded-lg mb-lg">
<div class="flex-1 text-center py-sm text-on-surface-variant font-label-lg text-label-lg rounded-md hover:bg-surface-container-highest cursor-pointer">
                Login
            </div>
<div class="flex-1 text-center py-sm bg-surface-container-lowest text-primary font-label-lg text-label-lg rounded-md shadow-[0px_2px_4px_rgba(0,0,0,0.05)] cursor-default">
                Register
            </div>
</div>
<!-- Role Selection (Bento Grid) -->
<div class="mb-lg">
<h2 class="font-title-lg text-title-lg text-on-surface mb-sm">Choose your role</h2>
<div class="grid grid-cols-2 gap-md">
<!-- Buyer Card (Inactive) -->
<div class="border border-outline-variant bg-surface-container-lowest rounded-[16px] p-md flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant text-[28px] mb-xs">shopping_bag</span>
<span class="font-label-lg text-label-lg text-on-surface">I am a Buyer</span>
</div>
<!-- Seller Card (Active) -->
<div class="border-2 border-primary bg-primary-fixed/20 rounded-[16px] p-md flex flex-col items-center justify-center relative shadow-[0px_4px_12px_rgba(230,92,0,0.08)]">
<div class="absolute top-2 right-2 bg-primary text-on-primary rounded-full w-5 h-5 flex items-center justify-center">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="material-symbols-outlined text-primary text-[28px] mb-xs" data-icon="storefront" style="font-variation-settings: 'FILL' 1;">storefront</span>
<span class="font-label-lg text-label-lg text-primary text-center">I am a Seller</span>
<span class="font-body-md text-body-md text-primary text-[10px] mt-1 opacity-80">Setup your shop</span>
</div>
</div>
</div>
<!-- Registration Form (Seller Specific) -->
<form class="space-y-md">
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="fullName">Full Name</label>
<input class="w-full bg-surface-container-lowest border border-outline rounded-[12px] px-md py-[10px] font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-on-surface-variant/50" id="fullName" placeholder="Enter your full name" type="text"/>
</div>
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="phone">Mobile Number</label>
<div class="flex">
<span class="inline-flex items-center px-md border border-r-0 border-outline bg-surface-variant rounded-l-[12px] font-body-lg text-body-lg text-on-surface-variant">+91</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-r-[12px] px-md py-[10px] font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-on-surface-variant/50" id="phone" placeholder="10-digit mobile number" type="tel"/>
</div>
</div>
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="shopName">Shop Name / Artisan Brand</label>
<input class="w-full bg-surface-container-lowest border border-outline rounded-[12px] px-md py-[10px] font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-on-surface-variant/50" id="shopName" placeholder="What do you call your business?" type="text"/>
</div>
<div class="pt-sm">
<button class="w-full bg-primary text-on-primary font-title-lg text-title-lg py-3 rounded-[24px] hover:bg-primary/90 transition-colors shadow-[0px_4px_16px_rgba(230,92,0,0.12)]" type="button">
                    Create Seller Account
                </button>
</div>
</form>
</div>
