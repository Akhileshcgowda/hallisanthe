<style>
        /* Custom Input Styles based on guidelines */
        .custom-input {
            border-radius: 12px;
            border: 1px solid #D9D4CD;
            background-color: theme('colors.surface-container-lowest');
            transition: all 0.2s ease-in-out;
        }
        .custom-input:focus {
            outline: none;
            border: 2px solid theme('colors.primary');
            box-shadow: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md antialiased pb-32">
<!-- TopAppBar -->
<header class="bg-[#FFF8F0] dark:bg-stone-900 border-b border-[#D9D4CD] dark:border-stone-700 shadow-[0px_4px_12px_rgba(230,92,0,0.08)] flex justify-between items-center w-full px-4 h-16 sticky top-0 z-50">
<div class="w-9 h-9 rounded-full overflow-hidden border border-outline-variant"><img alt="Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uj2tApFsGwmoD2la--e_6330RszmD_tUE1ECd6_Sy1EzcjX3MImZbpbSDXZpIBNdLpFukX5hVck0mIKeuVmJSGRZ-93Wbdq9QughKDhZC4fTkz9I1qQ8ojhnbEGWskwVSFFG8fHjP_70ClNz776y6VKggRPFm5cqlVwYPwIq9QttKkHoCtQ4aIHhBkxBeCP1rm_IZC3O-AbwpJRp7vkylqTMdnHoU7fnzoBdNR1zRYZZ5TX9yodGW8M34C87foWnTJZOZkeL6Z5Cg"/></div>
<div class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-[#E65C00] dark:text-orange-500 text-2xl font-black">
            Halli-Santhe
        </div>
<div class="w-9 h-9 rounded-full overflow-hidden border border-outline-variant"><img alt="Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uj2tApFsGwmoD2la--e_6330RszmD_tUE1ECd6_Sy1EzcjX3MImZbpbSDXZpIBNdLpFukX5hVck0mIKeuVmJSGRZ-93Wbdq9QughKDhZC4fTkz9I1qQ8ojhnbEGWskwVSFFG8fHjP_70ClNz776y6VKggRPFm5cqlVwYPwIq9QttKkHoCtQ4aIHhBkxBeCP1rm_IZC3O-AbwpJRp7vkylqTMdnHoU7fnzoBdNR1zRYZZ5TX9yodGW8M34C87foWnTJZOZkeL6Z5Cg"/></div>
</header>
<!-- Main Content Canvas -->
<main class="px-container-margin py-lg max-w-2xl mx-auto flex flex-col gap-lg">
<!-- Header -->
<!-- Image Upload Box -->
<div class="w-full aspect-video bg-surface-container rounded-[16px] border-2 border-dashed border-outline flex flex-col items-center justify-center cursor-pointer hover:bg-surface-variant transition-colors group">
<div class="w-16 h-16 rounded-full bg-surface flex items-center justify-center shadow-sm mb-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl text-primary" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
<span class="font-title-lg text-title-lg text-on-surface">Upload Image</span>
<span class="font-body-md text-body-md text-on-surface-variant mt-xs">Tap to select from gallery</span>
</div>
<!-- Kolam Divider -->
<div aria-hidden="true" class="h-lg w-full flex items-center justify-center opacity-40 text-outline select-none">
<span class="tracking-[0.8em] text-sm">◆ ◇ ◆ ◇ ◆</span>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-md">
<!-- Product Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="productName">Product Name</label>
<input class="custom-input w-full px-4 py-3 font-body-lg text-body-lg text-on-surface" id="productName" placeholder="e.g. Handwoven Silk Saree" type="text"/>
</div>
<!-- Category -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="category">Category</label>
<div class="relative">
<select class="custom-input w-full px-4 py-3 font-body-lg text-body-lg text-on-surface appearance-none bg-transparent relative z-10" id="category">
<option disabled="" selected="" value="">Select a category</option>
<option value="textiles">Textiles &amp; Handlooms</option>
<option value="woodwork">Woodwork &amp; Carving</option>
<option value="pottery">Pottery &amp; Ceramics</option>
<option value="jewelry">Jewelry</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant z-0 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Price & Location Row -->
<div class="grid grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="price">Price (₹)</label>
<input class="custom-input w-full px-4 py-3 font-body-lg text-body-lg text-on-surface" id="price" placeholder="0.00" type="number"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="location">Location</label>
<div class="relative">
<input class="custom-input w-full pl-10 pr-4 py-3 font-body-lg text-body-lg text-on-surface" id="location" placeholder="City/Village" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">location_on</span>
</div>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="description">Description</label>
<textarea class="custom-input w-full px-4 py-3 font-body-lg text-body-lg text-on-surface resize-none" id="description" placeholder="Describe the materials, origin, and story behind this product..." rows="4"></textarea>
</div>
<!-- Seller Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="sellerName">Seller / Artisan Name</label>
<input class="custom-input w-full px-4 py-3 font-body-lg text-body-lg text-on-surface" id="sellerName" placeholder="Your name or shop name" type="text"/>
</div>
</form>
</main>
<!-- FAB: Santhe AI -->
<button class="fixed bottom-[104px] right-container-margin z-40 bg-secondary-container text-on-secondary-container rounded-full px-5 py-3 flex items-center gap-sm shadow-[0px_4px_12px_rgba(230,92,0,0.12)] hover:shadow-[0px_8px_24px_rgba(230,92,0,0.2)] transition-all hover:-translate-y-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-label-lg text-label-lg">Santhe AI</span>
</button>
<!-- Fixed Bottom Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-outline-variant px-container-margin py-md shadow-[0px_-4px_16px_rgba(230,92,0,0.12)] z-50 flex justify-center pb-safe">
<button class="w-full max-w-2xl bg-primary text-on-primary font-title-lg text-title-lg rounded-[24px] py-4 text-center shadow-md hover:bg-surface-tint transition-colors active:scale-[0.98]">
            Upload Product
        </button>
</div>
</body></html>
