<body class="bg-background text-on-background min-h-screen flex flex-col font-sans selection:bg-primary-container selection:text-on-primary-container">

</button>
<img alt="Halli-Santhe Logo" class="h-12 w-auto object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uiHzAqeJy7IaEttjT8DD-k5nnt2a-liQk60yXROA1yIPVu0Z-jO-Fy2rrAMwEoZqtjx1af3jAzhl4Gf5zBOyPg9k89F2fyYYVkNO0iGJBC6Oz1KcJDPJBB4mN_CumHsc8dIis7w5e222JwNoEk-uiOgtWokahbvIuU2lzAx_d5w91EIPiZH8OVwDtkagdKjPtdI34iudD7DmGkKDtUJ6EXg3-sG4T1kwxNBBj1AWcGN9vZCuXvxI7ZcoYzMHX4PY75FBhWbvc1tX7A"/>

<span class="material-symbols-outlined text-[#C05A3E] dark:text-[#E27D5F] group-hover:text-[#9b3f25]" data-icon="shopping_cart">shopping_cart</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-28 md:pb-12 px-4 md:px-margin-desktop max-w-7xl mx-auto w-full flex flex-col gap-8">
<!-- Header Area -->
<div class="flex flex-col gap-2 relative">
<!-- Decorative subtle shape -->
<div class="absolute -top-4 -left-4 w-24 h-24 bg-primary-fixed-dim/20 rounded-full blur-2xl -z-10"></div>
<h2 class="font-headline-lg text-headline-lg text-on-background">Add New Product</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-2xl">Bring your craft to the digital market. Upload clear photos and tell the story behind your creation.</p>
</div>
<!-- Bento Grid Form Layout -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
<!-- Left Column: Photo Upload -->
<div class="md:col-span-5 flex flex-col gap-4 sticky top-28">
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant overflow-hidden flex flex-col group relative">
<!-- The "Tactile" frame -->
<div class="p-4 bg-surface-container-low border-b border-outline-variant flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface">Product Photo</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="info">info</span>
</div>
<!-- Upload Area / Preview -->
<div class="relative aspect-[4/5] bg-surface flex flex-col items-center justify-center cursor-pointer hover:bg-surface-bright transition-colors group">
<!-- Mock Preview Image - represents what happens after upload -->
<img alt="Product preview" class="absolute inset-0 w-full h-full object-cover z-0 opacity-80 mix-blend-multiply transition-transform duration-700 group-hover:scale-105" data-alt="close up of a hand-painted vibrant terracotta pot with traditional indian warli art patterns sitting on a rough wooden table bathed in warm afternoon sunlight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2YbgKem0IEO4L-JnxHcy_toO_9BT2yKO6_QDpS4j77cc7gfxxjYQH2ei7kgqAK6B9AfxU7A4RBJEM_N66V1P3IUiprDDhrqmWsmOPhndD4GtyfhEan18QIIradeFbfyH7M60xXld3AKZjw73v3SK8bahpNDe1-4kTVZmyFals3-EBTVY4noFGsBX9Guh6NQhyIFDmOQ5NunF67tACLSbKh3uvBL8k1x_N15RJc4LeFT1H-_WrQYA6QJMNdZ7uq2dx5FldekNc6EaC"/>
<!-- Overlay for "Change Photo" action -->
<div class="absolute inset-0 bg-background/20 backdrop-blur-[2px] opacity-0 group-hover:opacity-100 transition-opacity z-10 flex items-center justify-center"></div>
<!-- Upload Instruction Card (Floats over preview to show how it looks when filled) -->
<div class="z-20 bg-surface-container-lowest/95 backdrop-blur-md px-6 py-8 rounded-lg border border-outline-variant flex flex-col items-center gap-3 shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container mb-2 shadow-inner">
<span class="material-symbols-outlined text-[32px]" data-icon="add_a_photo">add_a_photo</span>
</div>
<span class="font-label-md text-label-md text-on-surface">Upload Photo</span>
<span class="font-label-sm text-label-sm text-on-surface-variant text-center max-w-[150px]">High quality images sell better</span>
</div>
</div>
</div>
</div>
<!-- Right Column: Details Form -->
<div class="md:col-span-7 flex flex-col gap-6">
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-6 md:p-8 flex flex-col gap-8 relative overflow-hidden">

<div class="absolute top-0 right-0 w-64 h-64 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-surface-variant/30 to-transparent -z-10 rounded-bl-full"></div>
<h3 class="font-headline-md text-headline-md text-on-surface border-b border-surface-variant pb-4">Product Details</h3>
<!-- Product Name Input (Minimalist Paper Style) -->
<div class="flex flex-col gap-2 group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-primary transition-colors">Product Name</label>
<input class="bg-surface-container-low border-0 border-b-2 border-primary focus:ring-0 focus:border-tertiary-container px-4 py-3 font-body-md text-body-md rounded-t-md text-on-surface w-full transition-colors placeholder:text-on-surface-variant/50" placeholder="e.g. Hand-painted Warli Vase" type="text"/>
</div>
<!-- Price Input -->
<div class="flex flex-col gap-2 group w-full md:w-1/2">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-primary transition-colors">Price</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-body-md text-body-md text-on-surface-variant">₹</span>
<input class="bg-surface-container-low border-0 border-b-2 border-primary focus:ring-0 focus:border-tertiary-container pl-8 pr-4 py-3 font-body-md text-body-md rounded-t-md text-on-surface w-full transition-colors placeholder:text-on-surface-variant/50" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Description Textarea -->
<div class="flex flex-col gap-2 group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-primary transition-colors">Story / Description</label>
<textarea class="bg-surface-container-low border-0 border-b-2 border-primary focus:ring-0 focus:border-tertiary-container px-4 py-3 font-body-md text-body-md rounded-t-md text-on-surface w-full resize-none transition-colors placeholder:text-on-surface-variant/50" placeholder="Tell the buyer how this was made, the materials used, and the story behind it..." rows="4"></textarea>
</div>
<!-- Category Chips -->
<div class="flex flex-col gap-3">
<label class="font-label-md text-label-md text-on-surface-variant">Category</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-primary bg-primary-container text-on-primary-container font-label-sm text-label-sm shadow-[0_2px_4px_rgba(155,63,37,0.15)] transition-transform active:scale-95">Pottery</button>
<button class="px-4 py-2 rounded-full border border-outline font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95">Hand-woven</button>
<button class="px-4 py-2 rounded-full border border-outline font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95">Woodwork</button>
<button class="px-4 py-2 rounded-full border border-outline font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95">Jewelry</button>
<button class="px-4 py-2 rounded-full border border-outline border-dashed font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors flex items-center gap-1 active:scale-95">
<span class="material-symbols-outlined text-[14px]" data-icon="add">add</span> New
                            </button>
</div>
</div>
<!-- Stock Quantity -->
<div class="flex flex-col gap-2 group w-full md:w-1/3 pt-4 border-t border-surface-variant">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-primary transition-colors">Available Stock</label>
<input class="bg-surface-container-low border-0 border-b-2 border-primary focus:ring-0 focus:border-tertiary-container px-4 py-3 font-body-md text-body-md rounded-t-md text-on-surface w-full transition-colors text-center" type="number" value="1"/>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row justify-end gap-4 mt-2">
<button class="px-6 py-3 rounded-full border border-tertiary font-label-md text-label-md text-tertiary hover:bg-tertiary-container hover:text-on-tertiary-container transition-colors active:scale-95 w-full sm:w-auto text-center">Save Draft</button>
<button class="px-8 py-3 rounded-full bg-primary font-label-md text-label-md text-on-primary shadow-[0_4px_12px_rgba(155,63,37,0.3)] hover:bg-primary-container hover:text-on-primary-container transition-all hover:-translate-y-0.5 active:scale-95 w-full sm:w-auto text-center flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="upload">upload</span>
                        Publish Product

<span class="material-symbols-outlined" data-icon="home_app_logo">home_app_logo</span>
<span class="font-['Epilogue'] font-medium text-[11px] mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 hover:text-[#C05A3E] active:scale-90 transition-transform group" href="#">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-['Epilogue'] font-medium text-[11px] mt-1">Browse</span>
</a>
<!-- Active State Logic: Semantic match for "Sell/Upload" -->
<a class="flex flex-col items-center justify-center text-[#C05A3E] bg-[#C05A3E]/10 rounded-xl px-4 py-1.5 active:scale-90 transition-transform shadow-sm" href="#">
<span class="material-symbols-outlined" data-icon="add_box" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_box</span>
<span class="font-['Epilogue'] font-bold text-[11px] mt-0.5">Sell</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 hover:text-[#C05A3E] active:scale-90 transition-transform group" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Epilogue'] font-medium text-[11px] mt-1">Account</span>
</a>
</nav>
