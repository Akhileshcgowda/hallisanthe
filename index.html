<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Halli-Santhe – Indian Artisan Marketplace</title>
<meta name="description" content="Discover authentic handcrafted treasures from Indian artisans. Shop terracotta, textiles, toys, spices and more on Halli-Santhe."/>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"/>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

          "on-primary-fixed-variant": "#7f2a12",
          "secondary-container": "#fe9832",

          "primary-container": "#bb563b",

          "tertiary-container": "#5c7c5e",

<link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen">

  <!-- ===== TOP APP BAR ===== -->
  <header id="top-bar" class="bg-[#FFFDFB] border-b border-[#C05A3E]/10 shadow-sm top-0 z-40 sticky transition-all duration-300">
    <div class="flex justify-between items-center w-full px-4 sm:px-6 h-16 max-w-7xl mx-auto">
      <!-- Left -->
      <div class="flex items-center gap-2">
        <button id="back-btn" class="hidden hover:bg-[#C05A3E]/5 transition-colors active:scale-95 duration-150 p-2 rounded-full text-stone-500" onclick="goBack()">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <button class="hover:bg-[#C05A3E]/5 transition-colors active:scale-95 duration-150 p-2 rounded-full hidden md:flex text-stone-500" onclick="navigate('home')">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
      <!-- Logo -->
      <div class="flex items-center absolute left-1/2 -translate-x-1/2">
        <img alt="Halli-Santhe Logo" class="h-10 w-auto object-contain cursor-pointer" onclick="navigate('home')"
          src="https://lh3.googleusercontent.com/aida/ADBb0uiHzAqeJy7IaEttjT8DD-k5nnt2a-liQk60yXROA1yIPVu0Z-jO-Fy2rrAMwEoZqtjx1af3jAzhl4Gf5zBOyPg9k89F2fyYYVkNO0iGJBC6Oz1KcJDPJBB4mN_CumHsc8dIis7w5e222JwNoEk-uiOgtWokahbvIuU2lzAx_d5w91EIPiZH8OVwDtkagdKjPtdI34iudD7DmGkKDtUJ6EXg3-sG4T1kwxNBBj1AWcGN9vZCuXvxI7ZcoYzMHX4PY75FBhWbvc1tX7A"/>
      </div>
      <!-- Right -->
      <div class="flex items-center gap-1">
        <!-- Desktop Nav -->
        <nav class="hidden md:flex items-center gap-1 mr-2">
          <button onclick="navigate('home')" data-nav="home" class="nav-link px-3 py-2 rounded-full text-stone-500 hover:text-[#C05A3E] hover:bg-[#C05A3E]/5 transition-colors font-medium text-sm flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[18px]">home_app_logo</span>Home
          </button>
          <button onclick="navigate('search')" data-nav="search" class="nav-link px-3 py-2 rounded-full text-stone-500 hover:text-[#C05A3E] hover:bg-[#C05A3E]/5 transition-colors font-medium text-sm flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[18px]">explore</span>Browse
          </button>
          <button onclick="navigate('sell')" data-nav="sell" class="nav-link px-3 py-2 rounded-full text-stone-500 hover:text-[#C05A3E] hover:bg-[#C05A3E]/5 transition-colors font-medium text-sm flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[18px]">add_box</span>Sell
          </button>
          <button onclick="navigate('profile')" data-nav="profile" class="nav-link px-3 py-2 rounded-full text-stone-500 hover:text-[#C05A3E] hover:bg-[#C05A3E]/5 transition-colors font-medium text-sm flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[18px]">person</span>Account
          </button>
        </nav>
        <button onclick="navigate('cart')" class="relative hover:bg-[#C05A3E]/5 transition-colors active:scale-95 duration-150 p-2 rounded-full text-stone-500">
          <span class="material-symbols-outlined">shopping_cart</span>
          <span id="cart-badge" class="absolute top-1 right-1 w-4 h-4 bg-[#C05A3E] text-white rounded-full text-[10px] flex items-center justify-center font-bold">3</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== SCREENS ===== -->
  <div id="app-root" class="pb-20 md:pb-0">
    <!-- Screens injected by JS -->
  </div>

  <!-- ===== BOTTOM NAV (Mobile) ===== -->
  <nav id="bottom-nav" class="md:hidden fixed bottom-0 w-full rounded-t-xl border-t border-[#C05A3E]/20 shadow-[0_-4px_12px_rgba(192,90,62,0.08)] bg-[#FFFDFB] z-50 flex justify-around items-center h-20 pb-safe px-4">
    <button onclick="navigate('home')" data-bn="home" class="bn-link flex flex-col items-center justify-center text-stone-400 hover:text-[#C05A3E] active:scale-90 transition-all w-16">
      <span class="material-symbols-outlined mb-0.5">home_app_logo</span>
      <span class="text-[10px] font-medium">Home</span>
    </button>
    <button onclick="navigate('search')" data-bn="search" class="bn-link flex flex-col items-center justify-center text-stone-400 hover:text-[#C05A3E] active:scale-90 transition-all w-16">
      <span class="material-symbols-outlined mb-0.5">explore</span>
      <span class="text-[10px] font-medium">Browse</span>
    </button>
    <button onclick="navigate('sell')" data-bn="sell" class="bn-link flex flex-col items-center justify-center text-stone-400 hover:text-[#C05A3E] active:scale-90 transition-all w-16">
      <span class="material-symbols-outlined mb-0.5">add_box</span>
      <span class="text-[10px] font-medium">Sell</span>
    </button>
    <button onclick="navigate('cart')" data-bn="cart" class="bn-link flex flex-col items-center justify-center text-stone-400 hover:text-[#C05A3E] active:scale-90 transition-all w-16">
      <span class="material-symbols-outlined mb-0.5">shopping_cart</span>
      <span class="text-[10px] font-medium">Cart</span>
    </button>
    <button onclick="navigate('profile')" data-bn="profile" class="bn-link flex flex-col items-center justify-center text-stone-400 hover:text-[#C05A3E] active:scale-90 transition-all w-16">
      <span class="material-symbols-outlined mb-0.5">person</span>
      <span class="text-[10px] font-medium">Account</span>
    </button>
  </nav>

  <script src="js/app.js"></script>
</body>
</html>
