</div>
<!-- Segmented Tabs -->
<div class="flex bg-surface-container-high rounded-lg p-xs w-full">
<button class="flex-1 bg-surface-container-lowest rounded shadow-sm py-sm font-label-lg text-label-lg text-primary text-center transition-all" type="button">
                    Login
                </button>
<button class="flex-1 py-sm font-label-lg text-label-lg text-on-surface-variant text-center hover:text-on-surface transition-all" type="button">
                    Register
                </button>
</div>
<!-- Bento Grid Role Selector -->
<div class="flex flex-col gap-sm">
<p class="font-title-lg text-title-lg text-on-surface text-center mb-xs">I am joining as a</p>
<div class="grid grid-cols-2 gap-md">
<!-- Buyer Card (Active State) -->
<div class="bg-primary-fixed border-2 border-primary rounded-xl p-md flex flex-col items-center justify-center text-center cursor-pointer relative overflow-hidden">
<div class="absolute -right-4 -top-4 w-12 h-12 bg-primary rounded-full opacity-10"></div>
<span class="material-symbols-outlined text-primary mb-xs" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;">shopping_bag</span>
<span class="font-label-lg text-label-lg text-on-primary-fixed mb-xs">Buyer</span>
<span class="font-body-md text-body-md text-on-primary-fixed-variant text-[11px] leading-tight">Browse &amp; buy products</span>
</div>
<!-- Seller Card (Inactive State) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col items-center justify-center text-center cursor-pointer hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface-variant mb-xs" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;">storefront</span>
<span class="font-label-lg text-label-lg text-on-surface mb-xs">Seller</span>
<span class="font-body-md text-body-md text-on-surface-variant text-[11px] leading-tight">Set up your shop</span>
</div>
</div>
</div>

<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface" for="phone">Phone Number</label>
<div class="relative flex items-center">
<span class="absolute left-gutter text-on-surface-variant font-body-lg text-body-lg pointer-events-none">+91</span>
<input class="w-full bg-surface-container-lowest border border-outline rounded-xl py-gutter pl-[48px] pr-gutter text-on-surface font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant" id="phone" placeholder="Enter your mobile number" type="tel"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Password</label>
<a class="font-label-lg text-label-lg text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<input class="w-full bg-surface-container-lowest border border-outline rounded-xl py-gutter px-gutter pr-[44px] text-on-surface font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant" id="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-gutter text-on-surface-variant hover:text-on-surface transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>

<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg rounded-full py-gutter mt-sm shadow-[0px_4px_16px_rgba(230,92,0,0.12)] hover:bg-primary-container hover:text-on-primary-container transition-all flex items-center justify-center gap-xs" type="submit">
                    Continue
                    <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-sm">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-body-md text-body-md text-on-surface-variant">or</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>

<button class="w-full bg-surface-container-lowest border border-outline rounded-full py-gutter px-md flex items-center justify-center gap-sm hover:bg-surface-container-low transition-colors" type="button">
